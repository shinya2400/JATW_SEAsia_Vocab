const allTypes = ["org","place","agreement","concept","event"];
const typeLabels = { org:"Organization", place:"Place", agreement:"Agreement/Treaty", concept:"Concept", event:"Event" };
let currentArticle = 0;
let activeFilters = new Set(allTypes);

function render() {
  const a = articles[currentArticle];
  document.getElementById("art-title").textContent = a.title;
  document.getElementById("art-source").textContent = a.source;
  const list = document.getElementById("terms-list");
  list.innerHTML = "";
  const filtered = a.terms.filter(t => activeFilters.has(t.type));
  if (!filtered.length) { list.innerHTML = '<p class="no-results">No terms match the selected filter.</p>'; return; }
  filtered.forEach(t => {
    const card = document.createElement("div");
    card.className = `term-card ${t.type}`;
    card.innerHTML = `<div class="term-header"><span class="term-name">${t.name}</span><span class="badge ${t.type}">${typeLabels[t.type]}</span></div><div class="term-def">${t.def}</div><div class="term-quote">${t.quote}</div>`;
    list.appendChild(card);
  });
}

function buildTabs() {
  const c = document.getElementById("tabs");
  articles.forEach((a,i) => {
    const btn = document.createElement("button");
    btn.className = "tab-btn" + (i===0?" active":"");
    btn.textContent = a.short;
    btn.onclick = () => { currentArticle=i; document.querySelectorAll(".tab-btn").forEach((b,j)=>b.classList.toggle("active",j===i)); render(); };
    c.appendChild(btn);
  });
}

function buildFilters() {
  const c = document.getElementById("filters");
  allTypes.forEach(type => {
    const btn = document.createElement("button");
    btn.className = "filter-btn active";
    btn.textContent = typeLabels[type];
    btn.onclick = () => {
      if (activeFilters.has(type)) { if(activeFilters.size===1) return; activeFilters.delete(type); btn.classList.remove("active"); }
      else { activeFilters.add(type); btn.classList.add("active"); }
      render();
    };
    c.appendChild(btn);
  });
}

buildTabs(); buildFilters(); render();
</script>
